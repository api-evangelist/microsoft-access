description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: microsoft-access-free
    name: Free
    type: freemium
    description: Free entry tier for the Microsoft Access API surface. Intended for evaluation, prototyping,
      and low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: Microsoft Access Database Engine API
      - name: Microsoft Graph API (for Access Online)
      - name: Microsoft Access VBA API
      - name: Microsoft Data Access Objects (DAO) API
      - name: Microsoft ActiveX Data Objects (ADO) API
      - name: Microsoft Access SQL API
      - name: Microsoft Access Macro Actions API
      - name: Power Automate Access Actions API
  - id: microsoft-access-pro
    name: Professional
    type: paid
    description: Production tier for Microsoft Access. Provides higher quotas, priority support, and access
      to the broader API portfolio. Pricing placeholder; align with the provider's pricing page.
    entries:
      - label: API Requests
        description: Monthly API request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 100000
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: TBD
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the professional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Overage
        description: Per-request price after monthly quota is exceeded
        name: overage
        type: metered
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 1000
        price: TBD
        userMultiplied: false
    elements:
      - name: All Production Endpoints
      - name: Email Support
      - name: SLA Targets
      - name: Webhook Subscriptions
      - name: Microsoft Access Database Engine API
      - name: Microsoft Graph API (for Access Online)
      - name: Microsoft Access VBA API
      - name: Microsoft Data Access Objects (DAO) API
      - name: Microsoft ActiveX Data Objects (ADO) API
      - name: Microsoft Access SQL API
      - name: Microsoft Access Macro Actions API
      - name: Power Automate Access Actions API
  - id: microsoft-access-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-negotiated tier for Microsoft Access. Includes dedicated capacity, contractual
      SLAs, security review, data residency options, and named technical account management.
    entries:
      - label: API Requests
        description: Negotiated request volume; -1 indicates uncapped subject to fair use
        name: api_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: configurable
        domains: []
        unit: 1
        price: custom
        userMultiplied: false
      - label: Rate Limit
        description: Negotiated burst and steady-state rate
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 1000
        timeFrame: minute
        geo: configurable
        domains: []
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Unlimited / Negotiated Volume
      - name: 24/7 Dedicated Support
      - name: Contractual SLA
      - name: Security & Compliance Review
      - name: Dedicated Account Manager
      - name: Custom Data Residency
      - name: Microsoft Access Database Engine API
      - name: Microsoft Graph API (for Access Online)
      - name: Microsoft Access VBA API
      - name: Microsoft Data Access Objects (DAO) API
      - name: Microsoft ActiveX Data Objects (ADO) API
      - name: Microsoft Access SQL API
      - name: Microsoft Access Macro Actions API
      - name: Power Automate Access Actions API
